        const box = document.getElementById('desc-box-' + pid);
        if (box) {
          box.classList.remove('editing');
          box.innerHTML = p.desc ? esc(p.desc) : '<span style="opacity:0.4; font-style:italic;">Açıklama yok...</span>';
        }
        toast('Açıklama güncellendi', 'var(--blue)');
      }
    }

    function closeViewModal() {
      document.getElementById('view-modal-overlay').classList.remove('open');
    }

    // Close view modal on ESC
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewModal(); });
    document.getElementById('view-modal-overlay').onclick = e => { if (e.target.id === 'view-modal-overlay') closeViewModal(); };

    function buildFeatureHTML(f, pid) {
      const isDone = f.done || f.tag === 'yapildi';
      const prioClass = f.priority ? `prio-${f.priority}` : '';
      return `
      <div class="feature-item ${prioClass}" data-fid="${f.id}" data-pid="${pid}" data-tag="${f.tag}" data-fulltext="${esc(f.text)}" draggable="true" 
           onpointerdown="this.style.cursor='grabbing'" onpointerup="this.style.cursor='grab'"
           ondragstart="handleDragStart(event)"
           ondragover="handleDragOverItem(event)"
           ondragend="handleDragEnd(event)"
           ondblclick="showFullFeatureText('${pid}', '${f.id}')"
           title="Tamamını görmek için çift tıkla">
        <span class="feature-text ${isDone ? 'done-text' : ''}">${esc(f.text)}</span>
      </div>`;
    }


    function esc(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Enter on feat input
    grid.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.classList.contains('feat-input')) {
        const pid = e.target.id.replace('feat-inp-', '');
        addFeature(pid);
      }
    });

    function addFeature(pid, fromModal = false) {
      const inp = document.getElementById('feat-inp-' + pid);
      const tagSel = document.getElementById('feat-tag-' + pid);
      const text = inp.value.trim();
      if (!text) { inp.focus(); return; }
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      if (!p.features) p.features = [];
      const trigger = document.getElementById('tag-trigger-' + pid);
      const tag = trigger ? trigger.dataset.tag : 'yapilacak';
      const priority = trigger ? trigger.dataset.prio : 'orta';
      const feat = { id: uid(), text, tag, done: tag === 'yapildi', priority };
      p.features.push(feat);
      save();
      inp.value = '';
      inp.focus();

      // reset active state
      const group = document.getElementById('feat-group-' + pid);
      if (group) group.classList.remove('active');

      if (fromModal) {
        const list = document.getElementById(`col-list-${feat.tag}-${pid}`);
        if (list) list.insertAdjacentHTML('beforeend', buildFeatureHTML(feat, pid));
      } else {
        updateProgressBar(pid);
      }
      updateStats();
      toast('Özellik eklendi', 'var(--green)');
    }

    function handleFeatInput(inp, pid) {
      const group = document.getElementById('feat-group-' + pid);
      if (!group) return;
      if (inp.value.trim().length > 0) {
        group.classList.add('active');
      } else {
        group.classList.remove('active');
      }
    }

    // ── PROJECT DRAG & DROP ──────────────────────────
    let draggingProjectId = null;
    let draggingProjectStatus = null;

    function handleProjectDragStart(e) {
      draggingProjectId = e.target.dataset.id;
      const p = projects.find(x => x.id === draggingProjectId);
      draggingProjectStatus = p ? p.status : null;
      e.dataTransfer.setData('pid', draggingProjectId);
      e.target.classList.add('dragging');
      // Show trash zone
      const tz = document.getElementById('drag-trash-zone');
      const tt = document.getElementById('trash-text');
      if (tt) tt.textContent = 'PROJEYİ SİLMEK İÇİN BURAYA BIRAK';
      if (tz) tz.classList.add('visible');
    }

    function handleProjectDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
      // Hide trash zone
      const tz = document.getElementById('drag-trash-zone');
      if (tz) tz.classList.remove('visible', 'drag-over');
    }

    function allowProjectDrop(e) {
      e.preventDefault();
    }

    function handleProjectDragEnter(e) {
      const col = e.target.closest('.kanban-column');
      if (!col) return;
      const colStatus = col.querySelector('.column-body').id.replace('col-', '');
      if (draggingProjectStatus !== colStatus) {
        col.classList.add('drag-over');
      }
    }

    function handleProjectDragLeave(e) {
      const col = e.target.closest('.kanban-column');
      if (col && !col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
      }
    }

    function handleProjectDragOverItem(e) {
      e.preventDefault();
      const item = e.target.closest('.project-card');
      if (!item || item.dataset.id === draggingProjectId) return;

      const p = projects.find(x => x.id === item.dataset.id);
      if (!p || p.status !== draggingProjectStatus) return;

      const list = item.parentElement;
      const items = [...list.querySelectorAll('.project-card')];
      const draggingItem = list.querySelector('.dragging');
      if (!draggingItem) return;

      const currPos = items.indexOf(draggingItem);
      const hoverPos = items.indexOf(item);

      if (currPos < hoverPos) {
        item.after(draggingItem);
      } else {
        item.before(draggingItem);
      }
    }

    function handleProjectDrop(e, newStatus) {
      e.preventDefault();
      const col = e.target.closest('.kanban-column');
      if (col) col.classList.remove('drag-over');

      const pid = e.dataTransfer.getData('pid');
      const pIdx = projects.findIndex(x => x.id === pid);
      if (pIdx === -1) return;
      const p = projects[pIdx];

      if (draggingProjectStatus !== newStatus) {
        projects.splice(pIdx, 1);
        p.status = newStatus;
        projects.unshift(p);
      } else {
        const list = document.getElementById(`col-${newStatus}`);
        const newOrderIds = [...list.querySelectorAll('.project-card')].map(i => i.dataset.id);
        const thisColumnProjects = newOrderIds.map(id => projects.find(x => x.id === id));

        const indices = [];
        projects.forEach((proj, idx) => {
          if (proj.status === newStatus) indices.push(idx);
        });

        thisColumnProjects.forEach((proj, i) => {
          projects[indices[i]] = proj;
        });
      }

      save();
      renderAll();
      toast('Sıralama güncellendi', 'var(--blue)');
    }

    function handleTrashDrop(e) {
      e.preventDefault();
      const pid = e.dataTransfer.getData('pid');
      const fid = e.dataTransfer.getData('fid');

      if (fid) {
        deleteFeature(pid, fid);
      } else if (pid) {
        deleteProject(pid);
      }

      const tz = document.getElementById('drag-trash-zone');
      if (tz) tz.classList.remove('visible', 'drag-over');
    }

    // ── FEATURE DRAG & DROP ──────────────────────────

    function toggleFeatureStatusPicker(e, pid, fid) {
      // picker removed for drag and drop
    }

    let draggingFid = null;
    let draggingTag = null;

    function handleDragStart(e) {
      draggingFid = e.target.dataset.fid;
      draggingTag = e.target.dataset.tag;
      e.dataTransfer.setData('fid', draggingFid);
      e.dataTransfer.setData('pid', e.target.dataset.pid);
      e.target.classList.add('dragging');
      // Show trash zone
      const tz = document.getElementById('drag-trash-zone');
      const tt = document.getElementById('trash-text');
      if (tt) tt.textContent = 'GÖREVİ SİLMEK İÇİN BURAYA BIRAK';
      if (tz) tz.classList.add('visible');
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.feat-col').forEach(c => c.classList.remove('drag-over'));
      // Hide trash zone
      const tz = document.getElementById('drag-trash-zone');
      if (tz) tz.classList.remove('visible', 'drag-over');
    }

    function allowDrop(e) {
      e.preventDefault();
    }

    function handleDragEnter(e) {
      const col = e.target.closest('.feat-col');
      if (!col) return;

      // Only show overlay if dragging to a DIFFERENT column
      const colTag = col.getAttribute('ondrop').match(/'([^']+)'/)[1];
      if (draggingTag !== colTag) {
        col.classList.add('drag-over');
      }
    }

    function handleDragLeave(e) {
      const col = e.target.closest('.feat-col');
      if (col && !col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
      }
    }

    function handleDragOverItem(e) {
      e.preventDefault();
      const item = e.target.closest('.feature-item');
      if (!item || item.dataset.fid === draggingFid) return;
      if (item.dataset.tag !== draggingTag) return; // Only sort in same column

      const list = item.parentElement;
      const items = [...list.querySelectorAll('.feature-item')];
      const draggingItem = list.querySelector('.dragging');
      if (!draggingItem) return;

      const currPos = items.indexOf(draggingItem);
      const hoverPos = items.indexOf(item);

      if (currPos < hoverPos) {
        item.after(draggingItem);
      } else {
        item.before(draggingItem);
      }
    }

    function handleDrop(e, newTag, pid) {
      e.preventDefault();
      const col = e.target.closest('.feat-col');
      if (col) col.classList.remove('drag-over');

      const fid = e.dataTransfer.getData('fid');
      const sourcePid = e.dataTransfer.getData('pid');
      if (sourcePid !== pid) return;

      const p = projects.find(x => x.id === pid);
      if (!p) return;

      // If moved between columns
      if (draggingTag !== newTag) {
        const fIdx = p.features.findIndex(x => x.id === fid);
        const f = p.features.splice(fIdx, 1)[0];
        f.tag = newTag;
        f.done = (newTag === 'yapildi');
        // Move to top of list as requested
        p.features.unshift(f);
      } else {
        // Reordering in same column (save order from DOM)
        const list = document.getElementById(`col-list-${newTag}-${pid}`);
        const newOrderIds = [...list.querySelectorAll('.feature-item')].map(i => i.dataset.fid);
        const sortedFeatures = [];
        newOrderIds.forEach(id => {
          sortedFeatures.push(p.features.find(f => f.id === id));
        });
        // Also add features from other columns back
        p.features.forEach(f => {
          if (f.tag !== newTag) sortedFeatures.push(f);
        });
        p.features = sortedFeatures;
      }

      save();
      openViewModal(pid);
      updateProgressBar(pid);
      updateStats();
    }

    function showFullFeatureText(pid, fid) {
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = (p.features || []).find(x => x.id === fid);
      if (!f) return;

      const viewer = document.createElement('div');
      viewer.id = 'full-feat-viewer';
      viewer.style = `
      position:fixed; inset:0; z-index:9999; 
      background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
      display:flex; align-items:center; justify-content:center; padding:20px;
      animation: fadeIn 0.2s ease-out;
    `;

      const saveAndClose = () => {
        const ta = document.getElementById('modal-feat-edit');
        if (ta) {
          const newVal = ta.value.trim();
          if (newVal && newVal !== f.text) {
            f.text = newVal;
            save();
            const item = document.querySelector(`[data-fid="${fid}"]`);
            if (item) item.querySelector('.feature-text').textContent = newVal;
            toast('Görev güncellendi', 'var(--blue)');
          }
        }
        viewer.remove();
      };

      viewer.onclick = (e) => { if (e.target === viewer) saveAndClose(); };

      const content = document.createElement('div');
      content.className = 'full-feat-content';
      content.style = `
      background:var(--bg2); border:1px solid var(--border);
      border-radius:24px; padding:32px; max-width:650px; width:100%;
      color:var(--text); font-family:'Space Mono', monospace; font-size:0.95rem;
      line-height:1.7; box-shadow:0 30px 70px rgba(0,0,0,0.6);
      position:relative; max-height:85vh; overflow-y:auto; text-align:left;
      word-break:break-word; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    `;

      const renderContent = (isEditing) => {
        if (!isEditing) {
          content.style.borderColor = 'var(--border)';
          content.style.background = 'var(--bg2)';
          content.style.boxShadow = '0 30px 70px rgba(0,0,0,0.6)';

          const prioUI = f.tag === 'yapilacak' ? `
            <div class="modal-prio-row" style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border)">
              <div class="modal-prio-label" style="font-size:0.7rem; color:var(--text-dim); margin-bottom:8px;"></div>
              <div class="modal-prio-btns" style="display:flex; gap:10px;">
                <button class="modal-prio-btn rahat ${f.priority === 'rahat' ? 'active' : ''}" onclick="updateFgetPrio('${pid}','${fid}','rahat')" style="padding:5px 12px; border-radius:15px; border:1px solid var(--border); background:var(--bg3); cursor:pointer;">Rahat</button>
                <button class="modal-prio-btn orta ${f.priority === 'orta' || !f.priority ? 'active' : ''}" onclick="updateFgetPrio('${pid}','${fid}','orta')" style="padding:5px 12px; border-radius:15px; border:1px solid var(--border); background:var(--bg3); cursor:pointer;">Orta</button>
                <button class="modal-prio-btn ciddi ${f.priority === 'ciddi' ? 'active' : ''}" onclick="updateFgetPrio('${pid}','${fid}','ciddi')" style="padding:5px 12px; border-radius:15px; border:1px solid var(--border); background:var(--bg3); cursor:pointer;">Ciddi</button>
              </div>
            </div>
          ` : '';

          content.innerHTML = `
            <div id="modal-feat-text" style="min-height:40px; white-space: pre-wrap;">${esc(f.text)}</div>
            ${prioUI}
          `;
          content.ondblclick = () => { content.dataset.editing = 'true'; render(); };
        } else {
          content.style.borderColor = 'var(--blue)';
          content.style.background = 'var(--bg3)';
          content.style.boxShadow = '0 0 30px rgba(61, 141, 255, 0.15)';
          content.innerHTML = `
            <textarea id="modal-feat-edit" style="
              width:100%; min-height:200px; background:transparent; border:none; outline:none;
              color:var(--text); font-family:inherit; font-size:inherit; line-height:inherit;
              resize:none; padding:0; display:block;
            ">${esc(f.text)}</textarea>
          `;
          const ta = content.querySelector('#modal-feat-edit');
          ta.focus();
          ta.setSelectionRange(ta.value.length, ta.value.length);

          ta.onkeydown = (ev) => {
            if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); saveAndClose(); }
            if (ev.key === 'Escape') { delete content.dataset.editing; render(); }
          };
          content.ondblclick = null;
        }
      };

      window.updateFgetPrio = (pid, fid, pVal) => {
        const p = projects.find(x => x.id === pid);
        const f = p.features.find(x => x.id === fid);
        f.priority = pVal;
        save();
        render(); // Refresh modal content
        // Also refresh the background on the card in the main detail view
        const card = document.querySelector(`[data-fid="${fid}"]`);
        if (card) {
          card.classList.remove('prio-rahat', 'prio-orta', 'prio-ciddi');
          card.classList.add('prio-' + pVal);
        }
      };

      const render = () => {
        const isEd = content.dataset.editing === 'true';
        renderContent(isEd);
      };

      render();
      viewer.appendChild(content);
      document.body.appendChild(viewer);
    }

    function toggleTagMenu(e, pid) {
      if (e) e.stopPropagation();
      const menu = document.getElementById('tag-menu-' + pid);
      if (!menu) return;

      const isOpen = menu.classList.contains('open');

      // Close all other tag menus
      document.querySelectorAll('.tag-menu').forEach(m => m.classList.remove('open'));

      if (!isOpen) {
        menu.classList.add('open');
      }
    }

    function selectTagPrio(pid, tag, prio) {
      const trigger = document.getElementById('tag-trigger-' + pid);
      const menu = document.getElementById('tag-menu-' + pid);

      trigger.dataset.tag = tag;
      trigger.dataset.prio = prio;

      const tagLabel = tag.toUpperCase();
      const prioLabel = prio.toUpperCase();
      trigger.innerHTML = `<span style="color:var(--orange)">● ${tagLabel} - ${prioLabel}</span>`;

      menu.classList.remove('open');
      toast(`Öncelik: ${prio.charAt(0).toUpperCase() + prio.slice(1)}`, 'var(--orange)');
    }



    function selectTagOnly(pid, tag) {
      const trigger = document.getElementById('tag-trigger-' + pid);
      const menu = document.getElementById('tag-menu-' + pid);

      trigger.dataset.tag = tag;
      trigger.dataset.prio = ''; // Reset prio for non-yapilacak tags

      const color = tag === 'eksik' ? 'var(--red)' : 'var(--green)';
      const label = tag === 'yapildi' ? 'YAPILDI' : 'ASKIDA';

      trigger.innerHTML = `<span style="color:${color}">● ${label}</span>`;

      menu.classList.remove('open');
    }

    // Removed redundant global click listener (consolidated above)

    function changeFeatureStatus(pid, fid, newTag) {
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = (p.features || []).find(x => x.id === fid);
      if (!f) return;

      f.tag = newTag;
      f.done = (newTag === 'yapildi');
      save();

      // Refresh modal to move item to correct column
      openViewModal(pid);
      updateProgressBar(pid);
      updateStats();
      toast('Görev durumu güncellendi', 'var(--blue)');
    }

    function toggleFeature(e, pid, fid) {
      if (e) e.stopPropagation();
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = (p.features || []).find(x => x.id === fid);
      if (!f) return;

      f.done = !f.done;
      if (f.done) f.tag = 'yapildi';
      else if (f.tag === 'yapildi') f.tag = 'yapilacak';
      save();

      // Always refresh modal to move item between kanban columns
      openViewModal(pid);
      updateProgressBar(pid);
      updateStats();
    }

    function deleteFeature(pid, fid) {
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = (p.features || []).find(x => x.id === fid);
      if (!f) return;

      if (!confirm(`"${f.text}" görevi silinsin mi?`)) return;

      p.features = (p.features || []).filter(x => x.id !== fid);
      save();
      const item = document.querySelector(`[data-fid="${fid}"]`);
      if (item) { item.style.opacity = '0'; item.style.transform = 'translateX(10px)'; item.style.transition = 'all 0.2s'; setTimeout(() => item.remove(), 200); }
      updateProgressBar(pid);
      updateStats();
      toast('Görev silindi', 'var(--red)');
    }

    function startEditFeature(e, pid, fid) {
      const item = e.target.closest('.feature-item');
      if (!item || item.classList.contains('editing')) return;

      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = p.features.find(x => x.id === fid);
      if (!f) return;

      item.classList.add('editing');
      item.draggable = false;
      const textSpan = item.querySelector('.feature-text');
      const currentVal = f.text;

      textSpan.innerHTML = `<input type="text" class="feat-edit-input" id="feat-edit-${fid}" value="${esc(currentVal)}" />`;
      const input = document.getElementById('feat-edit-' + fid);
      input.focus();
      input.select();

      input.onblur = () => saveFeature(pid, fid);
      input.onkeydown = (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
        if (ev.key === 'Escape') {
          item.classList.remove('editing');
          item.draggable = true;
          textSpan.innerHTML = esc(f.text);
        }
      };
    }

    function saveFeature(pid, fid) {
      const input = document.getElementById('feat-edit-' + fid);
      if (!input) return;

      const newVal = input.value.trim();
      const p = projects.find(x => x.id === pid);
      if (!p) return;
      const f = p.features.find(x => x.id === fid);

      const item = document.querySelector(`[data-fid="${fid}"]`);
      const textSpan = item ? item.querySelector('.feature-text') : null;

      if (newVal && f) {
        f.text = newVal;
        save();
        toast('Görev güncellendi', 'var(--blue)');
      }

      if (item && textSpan && f) {
        item.classList.remove('editing');
        item.draggable = true;
        textSpan.innerHTML = esc(f.text);
      }
    }

    function updateProgressBar(pid) {
      // Progress is now only shown in the Details Modal (handled by updateModalProgressBar)
    }

    function deleteProject(id) {
      const p = projects.find(x => x.id === id);
      if (!p) return;
      if (!confirm(`"${p.name}" silinsin mi?`)) return;
      projects = projects.filter(x => x.id !== id);
      save();
      const card = document.querySelector(`.project-card[data-id="${id}"]`);
      if (card) {
        card.style.transition = 'all 0.3s'; card.style.opacity = '0'; card.style.transform = 'scale(0.95)';
        setTimeout(() => { card.remove(); updateStats(); checkEmpty(); }, 300);
      }
      toast('Proje silindi', 'var(--red)');
    }

    function checkEmpty() {
      if (document.querySelectorAll('.project-card').length === 0) renderAll();
    }

    // ── MODAL ─────────────────────────────────────────
    const overlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const nameInp = document.getElementById('proj-name');
    const statusSel = document.getElementById('proj-status');
    const descInp = document.getElementById('proj-desc');

    document.getElementById('add-project-btn').addEventListener('click', () => openModal());
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.getElementById('modal-save').addEventListener('click', saveProject);

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    nameInp.addEventListener('keydown', e => { if (e.key === 'Enter') saveProject(); });

    function openModal() {
      editingId = null;
      modalTitle.textContent = 'YENİ PROJE';
      nameInp.value = ''; statusSel.value = 'progress'; descInp.value = '';
      overlay.classList.add('open');
      setTimeout(() => nameInp.focus(), 100);
    }

    function openEdit(id) {
      const p = projects.find(x => x.id === id);
      if (!p) return;
      editingId = id;
      modalTitle.textContent = 'PROJEYİ DÜZENLE';
      nameInp.value = p.name; statusSel.value = p.status; descInp.value = p.desc || '';
      overlay.classList.add('open');
      setTimeout(() => nameInp.focus(), 100);
    }

    function closeModal() { overlay.classList.remove('open'); editingId = null; }

    function saveProject() {
      const name = nameInp.value.trim();
      if (!name) { nameInp.focus(); nameInp.style.borderColor = 'var(--red)'; setTimeout(() => nameInp.style.borderColor = '', 800); return; }
      if (editingId) {
        const p = projects.find(x => x.id === editingId);
        if (p) { p.name = name; p.status = statusSel.value; p.desc = descInp.value.trim(); }
        save(); renderAll(); toast('Proje güncellendi', 'var(--blue)');
      } else {
        const p = { id: uid(), name, status: statusSel.value, desc: descInp.value.trim(), features: [], createdAt: Date.now() };
        projects.unshift(p);
        save(); renderAll(); toast('Proje eklendi!', 'var(--green)');
      }
      closeModal();
    }



    // ── SEARCH ───────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderAll();
    });

    // ── TOAST ────────────────────────────────────────
    function toast(msg, color = 'var(--green)') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `<i class="fa fa-circle-check" style="color:${color}"></i>${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 2200);
    }

    // ── INIT ─────────────────────────────────────────
    // ── INITIALIZE ────────────────────────────────────
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) splash.classList.add('splash-hidden');
      }, 1600);
    });

    load();
    renderAll();
  </script>
</body>

</html>
